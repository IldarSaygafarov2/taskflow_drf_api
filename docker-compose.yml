services:
  django-api:
    container_name: django_api_c
    build: .
    env_file:
      - ./.env
    ports:
      - "8001:8001"
    depends_on:
      - db
    command: "gunicorn -c deploy/gunicorn_conf.py core.project.wsgi:application --reload"

  db:
    image: postgres:16-alpine

    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
